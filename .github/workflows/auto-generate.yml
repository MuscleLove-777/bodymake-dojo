name: ボディメイク道場 自動記事生成

on:
  schedule:
    # 毎日 JST 13:00 (UTC 4:00) - 他ブログとずらして実行
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: blog_engineをチェックアウト
        uses: actions/checkout@v4
        with:
          repository: MuscleLove-777/blog-engine
          path: blog_engine
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージをインストール
        run: pip install -r blog_engine/requirements.txt

      - name: 記事を自動生成してサイトをビルド
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          for i in 1 2 3; do
            echo "=== 試行 $i/3 ==="
            python generate_and_build.py && exit 0
            if [ $i -lt 3 ]; then
              WAIT=$((60 * i))
              echo "API制限の可能性あり。${WAIT}秒待機して再試行..."
              sleep $WAIT
            fi
          done
          echo "::warning::3回の試行全てが失敗しました。次回のスケジュール実行を待ちます。"
          exit 1

      - name: 生成した記事をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "記事自動生成: $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: GitHub Pages にデプロイ
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/site
          publish_branch: gh-pages
